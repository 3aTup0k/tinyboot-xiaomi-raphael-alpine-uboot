name: Build System Image

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        type: choice
        options:
          - parallel
          - single
        default: 'parallel'
      system_types:
        description: 'System types (separate multiple values with commas, e.g.: tinyfs-iphoneos)'
        required: false
        default: 'tinyfs-iphoneos'
        type: string
      kernel_versions:
        description: 'Kernel versions (separate multiple values with commas, e.g.: 6.18,7.0)'
        required: false
        default: '6.18,7.0'
        type: string
      bootstrap_tools:
        description: 'Build tools (separate multiple values with commas, e.g.: mmdebstrap)'
        required: false
        default: 'mmdebstrap'
        type: string
      desktop_environments:
        description: 'Desktop environment (only for Phosh versions)'
        required: false
        default: 'phosh-full'
        type: string
      debian_versions:
        description: 'Debian versions (separate multiple values with commas, e.g.: trixie,bookworm)'
        required: false
        default: 'trixie'
        type: string
      ubuntu_versions:
        description: 'Ubuntu versions (separate multiple values with commas, e.g.: noble,resolute)'
        required: false
        default: 'resolute'
        type: string
      kernel_repository:
        description: 'Kernel package repository'
        required: false
        default: 'GengWei1997/linux-xiaomi-raphael-uboot'
        type: string
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'build.sh'
      - '*.sh'
  pull_request:
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'build.sh'
      - '*.sh'

env:
  HOSTNAME: raphael
  BOOT_IMG: xiaomi-k20pro-boot.img
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPPRESS_DEPRECATION_WARNINGS: true

permissions:
  contents: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      build_mode: ${{ steps.generate.outputs.build_mode }}
      single_system_type: ${{ steps.generate.outputs.single_system_type }}
      single_kernel_version: ${{ steps.generate.outputs.single_kernel_version }}
      single_os_version: ${{ steps.generate.outputs.single_os_version }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          set -e
          
          BUILD_MODE="${{ github.event.inputs.build_mode }}"
          echo "build_mode=${BUILD_MODE}" >> $GITHUB_OUTPUT
          SYS_TYPES="${{ github.event.inputs.system_types }}"
          KERN_VERS="${{ github.event.inputs.kernel_versions }}"
          BOOT_TOOLS="${{ github.event.inputs.bootstrap_tools }}"
          DESKTOP_ENV="${{ github.event.inputs.desktop_environments }}"
          DEB_VERS="${{ github.event.inputs.debian_versions }}"
          UBU_VERS="${{ github.event.inputs.ubuntu_versions }}"
          
          if [ "$BUILD_MODE" = "single" ]; then
            # Single mode: take the first value of each input
            SYS_TYPE=$(echo "$SYS_TYPES" | cut -d',' -f1)
            KERN_VER=$(echo "$KERN_VERS" | cut -d',' -f1)
            TOOL=$(echo "$BOOT_TOOLS" | cut -d',' -f1)
            
            if [[ "$SYS_TYPE" == kali-* ]]; then
              DEB_VER="kali-rolling"
              UBU_VER=""
              OS_VER="kali-rolling"
            elif [[ "$SYS_TYPE" == debian-* ]]; then
              DEB_VER=$(echo "$DEB_VERS" | cut -d',' -f1)
              UBU_VER=""
              OS_VER="$DEB_VER"
            else
              DEB_VER=""
              UBU_VER=$(echo "$UBU_VERS" | cut -d',' -f1)
              OS_VER="$UBU_VER"
            fi
            
            # Output single build info for the release job
            echo "single_system_type=${SYS_TYPE}" >> $GITHUB_OUTPUT
            echo "single_kernel_version=${KERN_VER}" >> $GITHUB_OUTPUT
            echo "single_os_version=${OS_VER}" >> $GITHUB_OUTPUT
            
            MATRIX="[{"system_type":"$SYS_TYPE","kernel_version":"$KERN_VER","bootstrap_tool":"$TOOL","debian_version":"$DEB_VER","ubuntu_version":"$UBU_VER","desktop_env":"$DESKTOP_ENV"}]"
          else
            # Parallel mode: generate JSON using plain bash
            MATRIX="["
            FIRST_ITEM=true
            
            # Split strings into arrays
            IFS=',' read -ra SYS_ARRAY <<< "$SYS_TYPES"
            IFS=',' read -ra KERN_ARRAY <<< "$KERN_VERS"
            IFS=',' read -ra TOOL_ARRAY <<< "$BOOT_TOOLS"
            IFS=',' read -ra DEB_ARRAY <<< "$DEB_VERS"
            IFS=',' read -ra UBU_ARRAY <<< "$UBU_VERS"
            
            # Generate Debian and TinyFS combinations
            for sys in "${SYS_ARRAY[@]}"; do
              if [[ "$sys" == debian-* || "$sys" == tinyfs* ]]; then
                for kern in "${KERN_ARRAY[@]}"; do
                  for tool in "${TOOL_ARRAY[@]}"; do
                    for deb_ver in "${DEB_ARRAY[@]}"; do
                      if [ "$FIRST_ITEM" = true ]; then
                        FIRST_ITEM=false
                      else
                        MATRIX="${MATRIX},"
                      fi
                      MATRIX="${MATRIX}{\"system_type\":\"$sys\",\"kernel_version\":\"$kern\",\"bootstrap_tool\":\"$tool\",\"debian_version\":\"$deb_ver\",\"ubuntu_version\":\"\",\"desktop_env\":\"$DESKTOP_ENV\"}"
                    done
                  done
                done
              fi
            done
            
            # Generate Ubuntu combinations
            for sys in "${SYS_ARRAY[@]}"; do
              if [[ "$sys" == ubuntu-* ]]; then
                for kern in "${KERN_ARRAY[@]}"; do
                  for tool in "${TOOL_ARRAY[@]}"; do
                    for ubu_ver in "${UBU_ARRAY[@]}"; do
                      if [ "$FIRST_ITEM" = true ]; then
                        FIRST_ITEM=false
                      else
                        MATRIX="${MATRIX},"
                      fi
                      MATRIX="${MATRIX}{\"system_type\":\"$sys\",\"kernel_version\":\"$kern\",\"bootstrap_tool\":\"$tool\",\"debian_version\":\"\",\"ubuntu_version\":\"$ubu_ver\",\"desktop_env\":\"$DESKTOP_ENV\"}"
                    done
                  done
                done
              fi
            done
            
            # Generate Kali combinations (always kali-rolling)
            for sys in "${SYS_ARRAY[@]}"; do
              if [[ "$sys" == kali-* ]]; then
                for kern in "${KERN_ARRAY[@]}"; do
                  for tool in "${TOOL_ARRAY[@]}"; do
                    if [ "$FIRST_ITEM" = true ]; then
                      FIRST_ITEM=false
                    else
                      MATRIX="${MATRIX},"
                    fi
                    MATRIX="${MATRIX}{\"system_type\":\"$sys\",\"kernel_version\":\"$kern\",\"bootstrap_tool\":\"$tool\",\"debian_version\":\"kali-rolling\",\"ubuntu_version\":\"\",\"desktop_env\":\"$DESKTOP_ENV\"}"
                  done
                done
              fi
            done
            
            MATRIX="${MATRIX}]"
          fi
          
          echo "Generated matrix: $MATRIX"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    name: ${{ format('Build {0}-{1}', matrix.system_type, matrix.kernel_version) }}
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    env:
      SYSTEM_TYPE: ${{ matrix.system_type }}
      KERNEL_VERSION: ${{ matrix.kernel_version }}
      BOOTSTRAP_TOOL: ${{ matrix.bootstrap_tool }}
      DESKTOP_ENV: ${{ matrix.desktop_env }}
      DEBIAN_VERSION: ${{ matrix.debian_version }}
      UBUNTU_VERSION: ${{ matrix.ubuntu_version }}
      KERNEL_REPO: ${{ github.event.inputs.kernel_repository || 'GengWei1997/linux-xiaomi-raphael-uboot' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          echo "[$(date +'%Y-%m-%d %H:%M:%S')] Checking and installing build tool: ${{ env.BOOTSTRAP_TOOL }}"
          
          if [ "${{ env.BOOTSTRAP_TOOL }}" = "mmdebstrap" ]; then
            if ! command -v mmdebstrap &> /dev/null; then
              echo "[$(date +'%Y-%m-%d %H:%M:%S')]   Installing mmdebstrap and dependencies..."
              sudo apt-get update
              sudo apt-get install -y mmdebstrap debian-archive-keyring
              echo "[$(date +'%Y-%m-%d %H:%M:%S')]   mmdebstrap installation completed"
            else
              echo "[$(date +'%Y-%m-%d %H:%M:%S')]   mmdebstrap already installed, skipping"
            fi
          else
            if ! command -v debootstrap &> /dev/null; then
              echo "[$(date +'%Y-%m-%d %H:%M:%S')]   Installing debootstrap..."
              sudo apt-get update
              sudo apt-get install -y debootstrap
              echo "[$(date +'%Y-%m-%d %H:%M:%S')]   debootstrap installation completed"
            else
              echo "[$(date +'%Y-%m-%d %H:%M:%S')]   debootstrap already installed, skipping"
            fi
          fi
          
          # Install Kali keyring if building Kali
          if [[ "${{ env.SYSTEM_TYPE }}" == kali-* ]]; then
            echo "[$(date +'%Y-%m-%d %H:%M:%S')]   Installing kali-archive-keyring..."
            wget -q -O- https://archive.kali.org/archive-key.asc | sudo gpg --dearmor -o /usr/share/keyrings/kali-archive-keyring.gpg
            echo "[$(date +'%Y-%m-%d %H:%M:%S')]   kali-archive-keyring installed"
          fi

      - name: Download kernel packages and boot.img (parallel)
        run: |
          mkdir -p xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}

          echo "Downloading kernel packages and boot.img (version: ${{ env.KERNEL_VERSION }})..."

          curl -sL -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/linux-image-xiaomi-raphael.deb \
            "https://github.com/${{ env.KERNEL_REPO }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/linux-image-xiaomi-raphael.deb" &
          PID1=$!

          curl -sL -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/linux-headers-xiaomi-raphael.deb \
            "https://github.com/${{ env.KERNEL_REPO }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/linux-headers-xiaomi-raphael.deb" &
          PID2=$!

          curl -sL -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/firmware-xiaomi-raphael.deb \
            "https://github.com/${{ env.KERNEL_REPO }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/firmware-xiaomi-raphael.deb" &
          PID3=$!

          curl -sL -o xiaomi-k20pro-boot.img \
            "https://github.com/GengWei1997/kernel-deb/releases/download/v1.0.0/xiaomi-k20pro-boot.img" &
          PID4=$!

          if [[ "${{ env.SYSTEM_TYPE }}" == *"phosh"* || "${{ env.SYSTEM_TYPE }}" == *"gnome"* ]]; then
            curl -sL -o alsa-xiaomi-raphael.deb \
              "https://github.com/${{ env.KERNEL_REPO }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/alsa-xiaomi-raphael.deb" &
            PID5=$!
          fi

          wait $PID1 $PID2 $PID3 $PID4
          [ -n "$PID5" ] && wait $PID5 || true

          echo "All downloads completed"

      - name: Check required files
        run: |
          echo "Checking required build files..."

          if [ ! -f "xiaomi-k20pro-boot.img" ]; then
            echo "Error: xiaomi-k20pro-boot.img does not exist"
            exit 1
          fi

          if [ ! -f "xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/linux-image-xiaomi-raphael.deb" ]; then
            echo "Error: linux-image-xiaomi-raphael.deb does not exist"
            exit 1
          fi

          echo "All required files present"

      - name: Execute build
        run: |
          set -e

          chmod +x build.sh

          sudo BOOTSTRAP_TOOL="${{ env.BOOTSTRAP_TOOL }}" DEBIAN_VERSION="${{ env.DEBIAN_VERSION }}" UBUNTU_VERSION="${{ env.UBUNTU_VERSION }}" ./build.sh "${{ env.SYSTEM_TYPE }}" "${{ env.KERNEL_VERSION }}" "${{ env.DESKTOP_ENV }}" "${{ env.DEBIAN_VERSION || env.UBUNTU_VERSION }}"

      - name: Generate artifact filenames and checksums
        id: artifacts
        run: |
          # Build artifact identifier
          OS_VER="${{ env.DEBIAN_VERSION || env.UBUNTU_VERSION }}"
          FILENAME="rootfs-${{ env.SYSTEM_TYPE }}-${{ env.KERNEL_VERSION }}-${OS_VER}"
          [[ "${{ env.SYSTEM_TYPE }}" == *"phosh"* ]] && FILENAME="${FILENAME}-${{ env.DESKTOP_ENV }}"
          
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "artifact_name=${FILENAME}" >> $GITHUB_OUTPUT
          
          # Generate checksum file
          sha256sum rootfs.img xiaomi-k20pro-boot.img > ${FILENAME}.sha256
          cat ${FILENAME}.sha256
          
          # Record file size
          ROOTFS_SIZE=$(stat -c%s rootfs.img)
          echo "rootfs_size=${ROOTFS_SIZE}" >> $GITHUB_OUTPUT

      - name: Compress image
        run: |
          FILENAME="${{ steps.artifacts.outputs.filename }}"
          echo "Compressing to ${FILENAME}.7z ..."
          7z a "${FILENAME}.7z" rootfs.img xiaomi-k20pro-boot.img
          ls -lh "${FILENAME}.7z"

      - name: Upload artifacts to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifacts.outputs.artifact_name }}
          path: |
            ${{ steps.artifacts.outputs.filename }}.7z
            ${{ steps.artifacts.outputs.filename }}.sha256
          retention-days: 7

      - name: Clean up temporary files
        if: always()
        run: |
          sudo rm -f alsa-xiaomi-raphael.deb 2>/dev/null || true
          sudo rm -rf rootdir 2>/dev/null || true
          rm -rf xiaomi-raphael-debs_* 2>/dev/null || true
          rm -f rootfs.img xiaomi-k20pro-boot.img 2>/dev/null || true

  release:
    needs: [generate-matrix, build]
    if: github.event_name == 'workflow_dispatch'
    name: Publish unified Release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rootfs-*
          merge-multiple: false

      - name: Prepare Release information
        id: release-info
        run: |
          TIMESTAMP=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          RUN_DATE=$(date +'%Y%m%d')
          BUILD_MODE="${{ needs.generate-matrix.outputs.build_mode }}"
          
          if [ "$BUILD_MODE" = "single" ]; then
            # Single build: use detailed tag
            SYS_TYPE="${{ needs.generate-matrix.outputs.single_system_type }}"
            KERN_VER="${{ needs.generate-matrix.outputs.single_kernel_version }}"
            OS_VER="${{ needs.generate-matrix.outputs.single_os_version }}"
            
            # Determine OS name
            if [[ "$SYS_TYPE" == kali-* ]]; then
              OS_NAME="Kali"
            elif [[ "$SYS_TYPE" == debian-* ]]; then
              OS_NAME="Debian"
            else
              OS_NAME="Ubuntu"
            fi
            
            TAG="${SYS_TYPE}-v${KERN_VER}-${OS_VER}-${RUN_DATE}"
            RELEASE_TITLE="${OS_NAME} ${SYS_TYPE#*-} image v${KERN_VER} (${OS_VER}) ${RUN_DATE}"
          else
            # Batch build: use unified tag
            TAG="build-${RUN_DATE}-${GITHUB_RUN_ID}"
            RELEASE_TITLE="Xiaomi Raphael Image Build ${RUN_DATE}"
          fi
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "name=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Generate Release description and classify files
        id: classify
        run: |
          TIMESTAMP="${{ steps.release-info.outputs.timestamp }}"
          ARTIFACTS_DIR="artifacts"
          RELEASE_DIR="release-files"
          
          # Create unified release directory
          mkdir -p "${RELEASE_DIR}"
          
          # Initialize arrays
          LARGE_FILES=""
          FILE_LIST=""
          
          # GitHub Release single file size limit: 2GB = 2147483648 bytes
          SIZE_LIMIT=2147483648
          
          # Iterate over all artifacts
          for artifact_dir in ${ARTIFACTS_DIR}/rootfs-*/; do
            [ -d "$artifact_dir" ] || continue
            
            for file in "${artifact_dir}"*.7z; do
              [ -f "$file" ] || continue
              
              filename=$(basename "$file")
              filesize=$(stat -c%s "$file")
              
              # Parse filename information
              # Format: rootfs-{system_type}-{kernel_version}-{os_version}[-{desktop_env}].7z
              IFS='-' read -ra PARTS <<< "${filename%.7z}"
              SYSTEM_TYPE="${PARTS[1]}"
              KERNEL_VER="${PARTS[2]}"
              OS_VER="${PARTS[3]}"
              
              # Get checksum
              shafile="${file%.7z}.sha256"
              if [ -f "$shafile" ]; then
                SHA256=$(awk 'NR==1 {print $1}' "$shafile")
              else
                SHA256=$(sha256sum "$file" | awk '{print $1}')
              fi
              
              # Build file info line
              FILE_INFO="| ${filename} | ${SYSTEM_TYPE} | ${KERNEL_VER} | ${OS_VER} |"
              
              if [ "$filesize" -gt "$SIZE_LIMIT" ]; then
                # Large file: not included in Release, kept in Artifacts
                LARGE_FILES="${LARGE_FILES}
          - ${filename} (${filesize} bytes)"
                FILE_LIST="${FILE_LIST}
          - ⚠️ **${filename}** (File too large, download from Artifacts)"
              else
                # Small file: include in Release, create symbolic link to unified directory
                ln -sf "$(realpath "$file")" "${RELEASE_DIR}/${filename}"
                FILE_LIST="${FILE_LIST}
          - ✅ **${filename}**"
              fi
              
              # Collect checksum information
              SHA256_LIST="${SHA256_LIST}
          ${filename}: ${SHA256}"
            done
          done
          
          # List files to upload
          echo "Files to upload to Release:"
          ls -la ${RELEASE_DIR}/
          
          {
            echo "large_files<<EOF"
            echo "$LARGE_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "file_list<<EOF"
            echo "$FILE_LIST"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "sha256_list<<EOF"
            echo "$SHA256_LIST"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release description
        id: description
        run: |
          TIMESTAMP="${{ steps.release-info.outputs.timestamp }}"
          FILE_LIST="${{ steps.classify.outputs.file_list }}"
          LARGE_FILES="${{ steps.classify.outputs.large_files }}"
          SHA256_LIST="${{ steps.classify.outputs.sha256_list }}"
          
          {
            echo "body<<EOF"
            echo "## Xiaomi Raphael (K20 Pro) System Image Collection"
            echo ""
            echo "> Automated build version - ${TIMESTAMP}"
            echo ""
            echo "### 📦 Image List"
            echo "$FILE_LIST"
            echo ""
            echo "### 🔒 SHA256 Checksums"
            echo "\`\`\`"
            echo "$SHA256_LIST"
            echo "\`\`\`"
            echo ""
            if [ -n "$LARGE_FILES" ]; then
              echo "### ⚠️ Large File Notice"
              echo "The following files exceed 2GB and are not uploaded to the Release; please download from Artifacts:"
              echo "$LARGE_FILES"
              echo ""
            fi
            echo "### 🔑 Default Credentials"
            echo "- **User**: \`user\` / **Password**: \`1234\`"
            echo "- **User**: \`root\` / **Password**: \`1234\`"
            echo ""
            echo "### 🌐 Network Connection (USB NCM)"
            echo "- Device IP: \`172.16.42.1\`"
            echo "- SSH command: \`ssh user@172.16.42.1\`"
            echo ""
            echo "---"
            echo "*Built with love by GitHub Actions & voxelsy*"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-info.outputs.tag }}
          name: ${{ steps.release-info.outputs.name }}
          body: ${{ steps.description.outputs.body }}
          draft: false
          prerelease: false
          files: release-files/*.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
